<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parcial 1 - PWA</title>
    <link href="css/estilos.css" rel="stylesheet">
    <script defer src="js/app.js"></script>
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/png" href="./img/favicon.png">
</head>

<body>
    <main class="aplicacion">
        <section class="tarjeta-tareas">

            <header class="cabecera-tareas">
                <div class="icono icono-izquierda">☕</div>

                <h1>Lista de tareas</h1>

                <div class="icono icono-derecha">📓</div>
            </header>

            <form class="formularioTareas" aria-label="Formulario para agregar nuevas tareas">
                <input 
                    type="text" 
                    id="entradaTarea" 
                    placeholder="Escribí una tarea..."
                    aria-label="Escribir una nueva tarea"
                >
                <button type="submit" aria-label="Agregar tarea">Agregar</button>
            </form>
            
            <p id="mensajeEntradaError" class="mensaje-error" aria-live="polite"></p>
            <p id="mensajeExito" class="mensaje-exito" aria-live="polite"></p>
            <p id="mensajeEliminado" class="mensaje-eliminado" aria-live="polite"></p>

            <section class="listaTareas" aria-label="Lista de tareas"></section>

        </section>
    </main>
</body>
</html>
